name: auranet
description: "AuraNet - Ev Ağı Güvenlik & Analiz Uygulaması"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.7
  firebase_messaging: ^15.2.7

  # Local Storage
  hive_flutter: ^1.1.0

  # HTTP
  dio: ^5.7.0

  # Network Scanning
  network_tools: ^3.0.4

  # Charts
  fl_chart: ^0.70.2

  # PDF
  pdf: ^3.11.2
  share_plus: ^10.1.4

  # Fonts
  google_fonts: ^6.2.1

  # Permissions
  permission_handler: ^11.4.0


  # Background Tasks (workmanager will be added in later phases with compatible version)

  # Notifications
  flutter_local_notifications: ^18.0.1

  # QR
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
